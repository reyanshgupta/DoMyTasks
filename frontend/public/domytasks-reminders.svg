<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">DoMyTasks reminders checklist icon</title>
  <desc id="desc">A rounded app tile with three colored reminder dots and three task lines.</desc>
  <style>
    :root {
      color-scheme: light dark;
      --dt-card: #ffffff;
      --dt-card-stroke: rgba(60, 60, 67, 0.16);
      --dt-line: #4a4a4f;
      --dt-blue: #007aff;
      --dt-red: #ff3b30;
      --dt-green: #34c759;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --dt-card: #2c2c2e;
        --dt-card-stroke: rgba(255, 255, 255, 0.18);
        --dt-line: #f2f2f7;
      }
    }

    .card {
      fill: var(--dt-card, #ffffff);
      stroke: var(--dt-card-stroke, rgba(60, 60, 67, 0.16));
    }

    .line {
      fill: var(--dt-line, #4a4a4f);
    }
  </style>
  <defs>
    <filter id="dot-shadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.16" />
    </filter>
    <linearGradient id="blue-dot" x1="139" y1="144" x2="189" y2="206" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1da2ff" />
      <stop offset="1" stop-color="var(--dt-blue)" />
    </linearGradient>
    <linearGradient id="red-dot" x1="139" y1="225" x2="189" y2="287" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff5a4f" />
      <stop offset="1" stop-color="var(--dt-red)" />
    </linearGradient>
    <linearGradient id="green-dot" x1="139" y1="306" x2="189" y2="368" gradientUnits="userSpaceOnUse">
      <stop stop-color="#45dc70" />
      <stop offset="1" stop-color="var(--dt-green)" />
    </linearGradient>
  </defs>

  <rect class="card" x="56" y="56" width="400" height="400" rx="92" stroke-width="1.5" />
  <g filter="url(#dot-shadow)">
    <circle cx="163" cy="176" r="30" fill="url(#blue-dot)" />
    <circle cx="163" cy="256" r="30" fill="url(#red-dot)" />
    <circle cx="163" cy="336" r="30" fill="url(#green-dot)" />
  </g>
  <g class="line" opacity="0.92">
    <rect x="221" y="165" width="158" height="22" rx="11" />
    <rect x="221" y="245" width="158" height="22" rx="11" />
    <rect x="221" y="325" width="158" height="22" rx="11" />
  </g>
</svg>
